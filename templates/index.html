<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pookiefy - Your Personal Music Haven</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <header>
        <div class="logo">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <path d="M20.4 12.9l-4.7-4.7c-.3-.3-.8-.3-1.1 0L9.3 13.5c-.3.3-.3.8 0 1.1l4.7 4.7c.3.3.8.3 1.1 0l5.3-5.3c.3-.3.3-.8 0-1.1z"/><path d="M3.6 11.1l4.7 4.7c.3.3.8.3 1.1 0l5.3-5.3c.3-.3.3-.8 0-1.1L9.3 4.7c-.3-.3-.8-.3-1.1 0L3.6 10c-.3.3-.3.8 0 1.1z"/></svg>
            Pookiefy
        </div>
    </header>
    <div class="container">
        
        <main>
            <div class="search-container">
                <input type="search" id="search-input" placeholder="What do you want to listen to?">
                <svg class="search-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
            <div class="search-results" id="search-results"></div>
        </main>
    </div>
    <footer>
        <div class="now-playing">
            <img id="current-song-image" src="https://via.placeholder.com/56" alt="Album cover">
            <div class="song-info">
                <h4 id="current-song-name">Song Name</h4>
                <p id="current-song-artist">Artist Name</p>
            </div>
        </div>
        <div class="controls">
            <div class="control-buttons">
                <button id="shuffle-button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 3 21 3 21 8"></polyline>
                        <line x1="4" y1="20" x2="21" y2="3"></line>
                        <polyline points="21 16 21 21 16 21"></polyline>
                        <line x1="15" y1="15" x2="21" y2="21"></line>
                        <line x1="4" y1="4" x2="9" y2="9"></line>
                    </svg>
                </button>
                <button id="previous-button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="19 20 9 12 19 4 19 20"></polygon>
                        <line x1="5" y1="19" x2="5" y2="5"></line>
                    </svg>
                </button>
                <button class="play-button" id="play-pause-button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                </button>
                <button id="next-button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 4 15 12 5 20 5 4"></polygon>
                        <line x1="19" y1="5" x2="19" y2="19"></line>
                    </svg>
                </button>
                <button id="repeat-button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="17 1 21 5 17 9"></polyline>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                        <polyline points="7 23 3 19 7 15"></polyline>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                    </svg>
                </button>
            </div>
            <div class="progress-bar">
                <span id="current-time">0:00</span>
                <input type="range" id="progress-slider" min="0" max="100" value="0">
                <span id="duration">0:00</span>
            </div>
        </div>
        <div class="volume-control">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            <input type="range" id="volume-slider" min="0" max="100" value="100">
        </div>
    </footer>

    <div id="loader-overlay" class="loader-overlay">
        <div class="loader"></div>
        <div class="loader-text">Loading your track...</div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');
        const audioPlayer = document.getElementById('audio-player');
        const playPauseButton = document.getElementById('play-pause-button');
        const previousButton = document.getElementById('previous-button');
        const nextButton = document.getElementById('next-button');
        const shuffleButton = document.getElementById('shuffle-button');
        const repeatButton = document.getElementById('repeat-button');
        const progressSlider = document.getElementById('progress-slider');
        const currentTimeDisplay = document.getElementById('current-time');
        const durationDisplay = document.getElementById('duration');
        const volumeSlider = document.getElementById('volume-slider');
        const currentSongImage = document.getElementById('current-song-image');
        const currentSongName = document.getElementById('current-song-name');
        const currentSongArtist = document.getElementById('current-song-artist');
        const loaderOverlay = document.getElementById('loader-overlay');

        let currentSong = null;
        let playlist = [];
        let currentIndex = 0;
        let isShuffled = false;
        let repeatMode = 'none'; // 'none', 'one', 'all'
        let get_audio_error = 0 ;

        let searchTimeout = null;

        const artists = [
    // Pop Artists
    "Ariana Grande", "Taylor Swift", "Billie Eilish", "Ed Sheeran", "Dua Lipa", 
    "Olivia Rodrigo", "Shawn Mendes", "Doja Cat", "Lizzo", "Harry Styles", 
    "Katy Perry", "The Weeknd", "Sam Smith", "Justin Bieber", "Rihanna", 

    // Hip-Hop/Rap Artists
    "Drake", "Kanye West", "Travis Scott", "Kendrick Lamar", "J. Cole", 
    "Lil Nas X", "Megan Thee Stallion", "Cardi B", "Post Malone", "Future", 
    "21 Savage", "Lil Baby", "Tyler, The Creator", "SZA", "Chance the Rapper", 

    // Rock/Alternative Artists
    "Imagine Dragons", "Coldplay", "The Killers", "Green Day", "Foo Fighters", 
    "Red Hot Chili Peppers", "Linkin Park", "Paramore", "The Strokes", "Arctic Monkeys", 
    "Muse", "Twenty One Pilots", "The Black Keys", "My Chemical Romance", "Kings of Leon",

    // Latin Artists
    "Bad Bunny", "J Balvin", "Maluma", "Shakira", "Karol G", 
    "Daddy Yankee", "Ozuna", "Anuel AA", "Ricky Martin", "Luis Fonsi", 

    // Indie Artists
    "Tame Impala", "The 1975", "Vampire Weekend", "Florence + The Machine", 
    "The Lumineers", "Foster the People", "Hozier", "Vance Joy", "Lord Huron", 
    "Glass Animals", "BØRNS", "Lorde", "Of Monsters and Men", "The xx",

    // EDM/Dance Artists
    "Calvin Harris", "David Guetta", "Marshmello", "Avicii", "Zedd", 
    "Martin Garrix", "The Chainsmokers", "Steve Aoki", "Deadmau5", "Kygo", 

    // R&B Artists
    "Frank Ocean", "H.E.R.", "John Legend", "Miguel", "Jhené Aiko", 
    "Solange", "Alicia Keys", "Bruno Mars", "Daniel Caesar", "Trey Songz", 

    // Country Artists
    "Luke Combs", "Kenny Chesney", "Carrie Underwood", "Blake Shelton", 
    "Keith Urban", "Miranda Lambert", "Tim McGraw", "George Strait", "Dolly Parton", 
    "Chris Stapleton", "Garth Brooks", "Florida Georgia Line", "Thomas Rhett", 

    // Other Global Artists
    "BTS", "BLACKPINK", "EXO", "NCT", "TWICE", "Stray Kids", "Seventeen", 
    "IU", "TXT", "BIGBANG", "G-Dragon", "PSY", "CNCO", "Luis Fonsi", "Zayn Malik",
    "Adele", "Eminem", "Drake", "Jay-Z", "Nas", "Nicki Minaj"
];


    // Pick a random artist from the array
        const randomArtist = artists[Math.floor(Math.random() * artists.length)];
        performSearch(randomArtist);

        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const searchTerm = searchInput.value.trim();
                if (searchTerm.length > 0) {
                    performSearch(searchTerm);
                } else {
                    searchResults.innerHTML = '';
                }
            }, 300);
        });

        async function performSearch(searchTerm) {
            try {
                const response = await fetch('/search-spotify-song', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ searchTerm }),
                });
                const data = await response.json();
                if (data.success) {
                    displaySearchResults(data.songs);
                    console.log(data.songs)
                } else {
                    console.error('Search failed:', data.error);
                }
            } catch (error) {
                console.error('Error during search:', error);
            }
        }

        function displaySearchResults(songs) {
            searchResults.innerHTML = '';
            songs.forEach(song => {
                const songCard = document.createElement('div');
                songCard.className = 'song-card';
                songCard.innerHTML = `
                    <img src="${song.album.images[0].url}" alt="${song.name} album cover">
                    <h3>${song.name}</h3>
                    <p>${song.artists.map(artist => artist.name).join(', ')}</p>
                `;
                songCard.addEventListener('click', () => {
                    playlist = songs;
                    currentIndex = playlist.indexOf(song);
                    playSong_using_youtube_audio(song);
                });
                searchResults.appendChild(songCard); 
            });
        }

        async function playSong_using_spotify_audio(song) {
            if (get_audio_error<2){
            loaderOverlay.classList.add('active');
            try {
                const response = await fetch('/song-info-to-audio-spotify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        songName: song.name,
                        spotifyUrl: song.external_urls.spotify,
                    }),
                });
                const data = await response.json();
                if (data.success) {
                    currentSong = {
                        ...song,
                        audioUrl: data.audio_url,
                    };
                    audioPlayer.src = currentSong.audioUrl;
                    audioPlayer.play();
                    loaderOverlay.classList.remove('active');
                    updateNowPlaying();
                } else {
                    get_audio_error += 1 ;
                    console.error('Failed to get audio:', data.error);
                    playSong_using_youtube_audio(song);
                }
            } catch (error) {
                get_audio_error += 1 ;
                console.error('Error getting audio:', error);
                playSong_using_youtube_audio(song);
            } 
        }
        else {
    loaderOverlay.innerHTML = "<h1>Error</h1>";
    
    // Wait for 5 seconds
    setTimeout(() => {
        loaderOverlay.classList.remove('active');
    }, 2000); // 5000 milliseconds = 5 seconds
}

        }

        async function playSong_using_youtube_audio(song) {
            if (get_audio_error<2){
            loaderOverlay.classList.add('active');
            try {
                const response = await fetch('/song-info-to-audio-yt', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        songName: song.name,
                        spotifyUrl: song.external_urls.spotify,
                        authorName: song.artists.map(artist => artist.name).join(', ')
                    }),
                });
                const data = await response.json();
                if (data.success) {
                    currentSong = {
                        ...song,
                        audioUrl: data.audio_url,
                    };
                    audioPlayer.src = currentSong.audioUrl;
                    audioPlayer.play();
                    loaderOverlay.classList.remove('active');
                    updateNowPlaying();
                } else {
                    get_audio_error += 1 ;
                    console.error('Failed to get audio:', data.error);
                    playSong_using_spotify_audio(song)
                }
            } catch (error) {
                get_audio_error += 1 ;
                console.error('Error getting audio:', error);
                playSong_using_spotify_audio(song)
            } 
        }
        else {
    loaderOverlay.innerHTML = "<h1>Error</h1>";
    
    // Wait for 5 seconds
    setTimeout(() => {
        loaderOverlay.classList.remove('active');
    }, 5000); // 5000 milliseconds = 5 seconds
}

        }

        function updateNowPlaying() {
            if (currentSong) {
                currentSongImage.src = currentSong.album.images[0].url;
                currentSongName.textContent = currentSong.name;
                currentSongArtist.textContent = currentSong.artists.map(artist => artist.name).join(', ');
            }
        }

        playPauseButton.addEventListener('click', togglePlayPause);
        previousButton.addEventListener('click', playPrevious);
        nextButton.addEventListener('click', playNext);
        shuffleButton.addEventListener('click', toggleShuffle);
        repeatButton.addEventListener('click', toggleRepeat);

        function togglePlayPause() {
            if (audioPlayer.paused) {
                audioPlayer.play();
            } else {
                audioPlayer.pause();
            }
        }

        function playPrevious() {
            if (currentIndex > 0) {
                currentIndex--;
            } else {
                currentIndex = playlist.length - 1;
            }
            playSong_using_youtube_audio(playlist[currentIndex]);
        }

        function playNext() {
            if (currentIndex < playlist.length - 1) {
                currentIndex++;
            } else {
                currentIndex = 0;
            }
            playSong_using_youtube_audio(playlist[currentIndex]);
        }

        function toggleShuffle() {
            isShuffled = !isShuffled;
            shuffleButton.style.color = isShuffled ? '#1DB954' : '#b3b3b3';
            if (isShuffled) {
                shufflePlaylist();
            } else {
                // Restore original order
                playlist.sort((a, b) => a.originalIndex - b.originalIndex);
            }
        }

        function shufflePlaylist() {
            for (let i = playlist.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [playlist[i], playlist[j]] = [playlist[j], playlist[i]];
            }
            currentIndex = playlist.findIndex(song => song.id === currentSong.id);
        }

        function toggleRepeat() {
            if (repeatMode === 'none') {
                repeatMode = 'all';
                repeatButton.style.color = '#1DB954';
            } else if (repeatMode === 'all') {
                repeatMode = 'one';
                repeatButton.style.color = '#1DB954';
                repeatButton.innerHTML = `
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="17 1 21 5 17 9"></polyline>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                        <polyline points="7 23 3 19 7 15"></polyline>
                        <path d="M21 13v2a4 4 0 0 1-4 4H8"></path>
                        <text x="11" y="15" font-size="8" fill="currentColor">1</text>
                    </svg>
                `;
            } else {
                repeatMode = 'none';
                repeatButton.style.color = '#b3b3b3';
                repeatButton.innerHTML = `
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="17 1 21 5 17 9"></polyline>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                        <polyline points="7 23 3 19 7 15"></polyline>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                    </svg>
                `;
            }
        }

        audioPlayer.addEventListener('play', () => {
            playPauseButton.innerHTML = `
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
            `;
        });

        audioPlayer.addEventListener('pause', () => {
            playPauseButton.innerHTML = `
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
            `;
        });

        audioPlayer.addEventListener('timeupdate', () => {
            const currentTime = audioPlayer.currentTime;
            const duration = audioPlayer.duration;
            progressSlider.value = (currentTime / duration) * 100;
            currentTimeDisplay.textContent = formatTime(currentTime);
            durationDisplay.textContent = formatTime(duration);
        });

        audioPlayer.addEventListener('ended', () => {
            if (repeatMode === 'one') {
                audioPlayer.currentTime = 0;
                audioPlayer.play();
            } else if (repeatMode === 'all' || currentIndex < playlist.length - 1) {
                playNext();
            } else {
                currentIndex = 0;
                playSong_using_youtube_audio(playlist[currentIndex]);
            }
        });

        progressSlider.addEventListener('input', () => {
            const time = (progressSlider.value / 100) * audioPlayer.duration;
            audioPlayer.currentTime = time;
        });

        volumeSlider.addEventListener('input', () => {
            audioPlayer.volume = volumeSlider.value / 100;
        });

        function formatTime(time) {
            const minutes = Math.floor(time / 60);
            const seconds = Math.floor(time % 60);
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                togglePlayPause();
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                audioPlayer.currentTime = Math.max(0, audioPlayer.currentTime - 5);
            } else if (e.code === 'ArrowRight') {
                e.preventDefault();
                audioPlayer.currentTime = Math.min(audioPlayer.duration, audioPlayer.currentTime + 5);
            } else if (e.code === 'ArrowUp') {
                e.preventDefault();
                volumeSlider.value = Math.min(100, parseInt(volumeSlider.value) +

 10);
                audioPlayer.volume = volumeSlider.value / 100;
            } else if (e.code === 'ArrowDown') {
                e.preventDefault();
                volumeSlider.value = Math.max(0, parseInt(volumeSlider.value) - 10);
                audioPlayer.volume = volumeSlider.value / 100;
            }
        });

    </script>
</body>
</html>
